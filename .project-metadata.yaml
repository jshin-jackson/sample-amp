name: Hello World AMP
description: >-
  Level 4 AMP example for beginners learning Cloudera AI.
  Demonstrates model training, registration, build, and deployment using
  create_model, build_model, and deploy_model tasks.
author: Your Name
specification_version: 1.0
prototype_version: 5.0
date: "2026-02-27"

runtimes:
  - editor: PBJ Workbench
    kernel: Python 3.11
    edition: Standard

environment_variables:
  # ── Level 2: File I/O Configuration ─────────────────────────────────────────
  REPORT_OUTPUT_DIR:
    default: "outputs"
    description: "Directory path where the job saves CSV and JSON report files."
    required: false
  REPORT_NAME:
    default: "data_report"
    description: "Base filename for the generated report (without extension)."
    required: false

  # ── Level 3: Dashboard Runtime Configuration ─────────────────────────────────
  DASHBOARD_TITLE:
    description: >-
      [REQUIRED] Custom title displayed in the dashboard header.
      Example: "My Team's Data Report Dashboard"
    required: true
  SCORE_ALERT_THRESHOLD:
    default: "80"
    description: >-
      Usage scores at or above this integer value are highlighted as
      High Performers in the dashboard. Default is 80.
    required: false
  ENABLE_RAW_DATA_DOWNLOAD:
    default: "true"
    description: >-
      Set to 'false' to hide the CSV download button in the Raw Dataset section.
      Useful when the report data should not be exported.
    required: false

tasks:
  # ---------------------------------------------------------------
  # Step 1: Session — Install Python dependencies
  # ---------------------------------------------------------------
  - type: run_session
    name: Install Dependencies
    script: 0_session-install-deps/install_deps.py
    short_summary: Install required Python packages from requirements.txt
    kernel: python3
    cpu: 2
    memory: 4

  # ---------------------------------------------------------------
  # Step 2: Job — Create the data report job definition
  # ---------------------------------------------------------------
  - type: create_job
    name: Data Report Job
    entity_label: data_report_job
    script: 1_job-data-report/report.py
    arguments: None
    cpu: 2
    memory: 4
    short_summary: Create a job that generates a data summary report
    long_summary: >-
      Creates a CML Job that reads a sample dataset, computes summary statistics
      using pandas, and writes a CSV and JSON report to the outputs/ directory.
    environment:
      TASK_TYPE: CREATE/RUN_JOB

  # ---------------------------------------------------------------
  # Step 3: Job — Execute the data report job
  # ---------------------------------------------------------------
  - type: run_job
    entity_label: data_report_job
    short_summary: Run the data report job
    long_summary: >-
      Executes the Data Report Job. Output files are saved to outputs/
      and will be loaded by the Streamlit dashboard application.

  # ---------------------------------------------------------------
  # Step 4: Session — Train and save the model artifact
  # ---------------------------------------------------------------
  # IMPORTANT: This must run BEFORE build_model, which packages model.pkl
  # into the serving Docker image.
  - type: run_session
    name: Train Usage Score Predictor
    script: 3_model-usage-predictor/train.py
    short_summary: Train a LinearRegression model and save model.pkl
    long_summary: >-
      Trains a scikit-learn LinearRegression model on the sample dataset
      (active_users → usage_score) and saves the artifact to
      3_model-usage-predictor/model.pkl. This file must exist before
      build_model packages it into the model serving image.
    kernel: python3
    cpu: 2
    memory: 4

  # ---------------------------------------------------------------
  # Step 5: Model — Register the model serving function with CML
  # ---------------------------------------------------------------
  - type: create_model
    name: Usage Score Predictor
    entity_label: usage_score_predictor
    script: 3_model-usage-predictor/predict.py
    function: predict
    short_summary: Register the Usage Score Predictor model
    long_summary: >-
      Registers the predict() function in predict.py as a CML Model endpoint.
      The function accepts {"active_users": <int>} and returns a predicted
      usage score. The model artifact (model.pkl) will be packaged during build.
    cpu: 1
    memory: 2

  # ---------------------------------------------------------------
  # Step 6: Model — Build the model serving Docker image
  # ---------------------------------------------------------------
  - type: build_model
    entity_label: usage_score_predictor
    comment: "Level 4 initial build"
    short_summary: Build the Usage Score Predictor serving image
    long_summary: >-
      Packages the project files (including model.pkl) into a Docker image
      that serves the predict() function as a REST API endpoint.
    cpu: 2
    memory: 4

  # ---------------------------------------------------------------
  # Step 7: Model — Deploy the model as a REST API endpoint
  # ---------------------------------------------------------------
  - type: deploy_model
    entity_label: usage_score_predictor
    short_summary: Deploy the Usage Score Predictor as a REST API
    long_summary: >-
      Deploys the built model image. Once Running, the model is available
      as a REST endpoint. Test it from Models menu → Usage Score Predictor
      → Test tab with input: {"active_users": 350}
    cpu: 1
    memory: 2
    replicas: 1

  # ---------------------------------------------------------------
  # Step 8: Application — Launch the Streamlit dashboard
  # ---------------------------------------------------------------
  - type: start_application
    name: Data Report Dashboard
    short_summary: Launch an interactive Streamlit dashboard
    long_summary: >-
      Starts a Streamlit web application that reads the CSV and JSON report
      files generated by the Data Report Job and displays them as an
      interactive dashboard with KPI metrics, charts, and a raw data table.
    subdomain: hello-world-amp
    script: 2_app-streamlit/launch.py
    cpu: 2
    memory: 4
    environment_variables:
      TASK_TYPE: START_APPLICATION
